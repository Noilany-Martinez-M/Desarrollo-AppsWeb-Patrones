<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<head th:replace="~{general/plantilla :: head}"></head>

<body>
    <!-- mostrar las categorias -->
    <section th:fragment="tarjetasCategorias" class="container py-4">
        <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4">
            <div th:each="c : ${categorias}" class="col">
                <div class="card h-100 shadow-sm">
                    <div class="d-flex justify-content-center align-items-center bg-light p-3" style="height: 200px;">
                        <img th:src="${c.rutaImagen}"
                             class="img-fluid"
                             th:alt="${c.descripcion}"
                             style="max-height: 100%; object-fit: contain;"/>
                    </div>
                    <div class="card-header bg-white">
                        <h5 class="card-title text-center text-truncate mb-0" th:text="${c.descripcion}">Nombre Categoría</h5>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <p class="card-text text-muted mb-auto text-truncate" th:text="${c.descripcion}">Descripción</p>
                    </div>
                    <div class="card-footer bg-white d-flex justify-content-between align-items-center">
                        <div class="fw-bold">
                            <span th:if="${c.activo}" class="badge text-bg-success">Activa</span>
                            <span th:unless="${c.activo}" class="badge text-bg-danger">Inactiva</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    
    <section th:fragment='consultasCategorias' class='row row-cols-4 p-2'>
            <div th:replace="~{consultaCategoria/fragmentos :: formConsulta('primary','Consulta Derivada','/consultaCategoria/consultaDerivadaCategoria')}"/>
            <div th:replace="~{consultaCategoria/fragmentos :: formConsulta('warning','Consulta JPQL','/consultaCategoria/consultaCategoriaJPQL')}"/>
            <div th:replace="~{consultaCategoria/fragmentos :: formConsulta('success','Consulta SQL','/consultaCategoria/consultaCategoriaSQL')}"/>
        </section>
    
    <!-- vista de categorias -->
        <div th:fragment='formConsulta(colorForm, textoForm, urlForm)'>
            <form method="post" th:action='@{${urlForm}}' class='was-validated'>
                <div class='card p-2'>
                    <div class="card-header text-center text-white" th:classappend="${'bg-'+colorForm}">
                        <h5>[[${textoForm}]]</h5>
                    </div>
                    <div class="card-body">
                        <div class='mb-3'>
                            <label>Descripción de categoría</label>
                            <input type="text" name='textoDescripcion' th:value='${textoDescripcion}'
                                   class='form-control' required="required"/>
                        </div>
                    </div>
                    <div class="card-footer text-center">
                        <button type='submit' class='btn text-white' th:classappend="${'btn-'+colorForm}">
                            <i class='fa-solid fa-magnifying-glass'></i> [[${textoForm}]]
                        </button>
                    </div>
                </div>
            </form>
        </div>
</body>
</html>
